    + '<button class="detail-back-btn" onclick="closeProfile()">←</button></div>'
    + '<div class="profile-hero">' + avatarHtml
    + '<div style="text-align:center;"><div class="profile-username">@' + escHtml(profile.username || '') + '</div>'
    + (profile.displayName ? '<div class="profile-displayname">' + escHtml(profile.displayName) + '</div>' : '') + '</div>'
    + '<div class="profile-stats">'
    + '<div class="profile-stat"><div class="profile-stat-num">' + (profile.recordCount || 0) + '</div><div class="profile-stat-lbl">Records</div></div>'
    + '<div class="profile-stat"><div class="profile-stat-num">' + (profile.followingCount || 0) + '</div><div class="profile-stat-lbl">Following</div></div>'
    + '<div class="profile-stat"><div class="profile-stat-num">' + (profile.followerCount || 0) + '</div><div class="profile-stat-lbl">Followers</div></div>'
    + '</div>' + followBtnHtml + '</div>'
    + '<div style="padding:16px;">';

  if (profile.bio) html += '<p style="font-size:14px;color:var(--text);line-height:1.6;margin-bottom:16px;">' + escHtml(profile.bio) + '</p>';
  if (!isSelf) html += '<div style="font-size:11px;color:var(--subtext);margin-bottom:16px;">' + (profile.isPublic ? '🌐 Public account' : '🔒 Private account') + '</div>';

  if (canView && (profile.setupDescription || profile.setupPhoto)) {

    if (profile.setupDescription) html += '<p style="font-size:13px;color:var(--subtext);line-height:1.6;">' + escHtml(profile.setupDescription) + '</p>';
    html += '</div>';
  }
  if (canView && (profile.storageDescription || profile.storagePhoto)) {
    html += '<div style="margin-bottom:16px;"><div class="section-hdr" style="margin:0 -16px 10px;padding-left:0;border-top:var(--border-w) solid var(--border);">📦 How they store</div>';
    if (profile.storagePhoto) html += '<img src="' + escHtml(profile.storagePhoto) + '" style="width:100%;border-radius:var(--radius);margin-bottom:8px;max-height:280px;object-fit:cover;">';
    if (profile.storageDescription) html += '<p style="font-size:13px;color:var(--subtext);line-height:1.6;">' + escHtml(profile.storageDescription) + '</p>';
    html += '</div>';
  }
  html += '</div>';

  if (!canView) {
    html += '<div class="locked-collection"><div style="font-size:32px;margin-bottom:8px;">🔒</div>'
      + '<div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;">Private collection</div>'
      + '<div style="font-size:13px;color:var(--subtext);">Follow @' + escHtml(profile.username || '') + ' to see their records.</div></div>';
  } else {
    html += '<div class="section-hdr">Their collection</div>'
      + '<div id="profile-collection" style="padding:0 12px 100px;"><div style="text-align:center;padding:30px 0;color:var(--subtext);font-size:13px;">Loading...</div></div>';
  }

  content.innerHTML = html;

  if (canView && profile.username) {
    try {
      const colData = await apiGet('/api/users/' + encodeURIComponent(profile.username) + '/collection');
      const profileReleases = colData.releases || [];
      const colEl = document.getElementById('profile-collection');
      if (!colEl) return;
      if (!profileReleases.length) { colEl.innerHTML = '<p style="text-align:center;color:var(--subtext);font-size:13px;padding:30px 0;">No records yet.</p>'; return; }
      colEl.innerHTML = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-top:12px;">'
        + profileReleases.map(function(r) {
          const bi = r.basic_information;
          const art = bi.cover_image || bi.thumb || '';
          const imgEl = (art && art !== 'https://st.discogs.com/')
            ? '<img src="' + escHtml(art) + '" style="width:100%;aspect-ratio:1;object-fit:cover;display:block;" loading="lazy">'
            : '<div style="width:100%;aspect-ratio:1;background:var(--artbg);display:flex;align-items:center;justify-content:center;"><div class="disc-icon"><div class="disc-hole"></div></div></div>';
          return '<div style="background:var(--card);border:var(--border-w) solid var(--border);border-radius:var(--radius);overflow:hidden;">' + imgEl
            + '<div style="padding:8px 10px;"><div style="font-size:11px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escHtml(bi.title) + '</div>'
            + '<div style="font-size:10px;color:var(--subtext);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escHtml(bi.artists?.[0]?.name || '') + '</div></div></div>';
        }).join('') + '</div>';
    } catch(e) {
      const colEl = document.getElementById('profile-collection');
      if (colEl) colEl.innerHTML = '<p style="color:var(--subtext);font-size:13px;padding:20px;text-align:center;">Could not load collection.</p>';
    }
  }
}

// ── Record owners (discovery) ─────────────────────────────────
async function loadRecordOwners(releaseId) {
  const el = document.getElementById('record-owners-section');
  if (!el) return;
  try {
    const data = await apiGet('/api/records/' + encodeURIComponent(releaseId) + '/owners');
    const owners = data.owners || [];
    if (!owners.length) return;
    el.innerHTML = '<div class="detail-section-title" style="margin-top:0;">Also owned by ' + owners.length + ' Wax ' + (owners.length === 1 ? 'user' : 'users') + '</div>'
      + owners.slice(0, 5).map(function(u) {
        const st = u.follow_status || 'none';
        const lbl = st === 'accepted' ? 'Following' : st === 'pending' ? 'Req\'d' : 'Follow';
        return '<div class="user-row" style="padding:8px 0;" onclick="openUserProfile(\'' + escHtml(u.username || '') + '\')">'
          + userAvatarHtml(u, 36)
          + '<div class="user-info"><div style="font-size:13px;font-weight:500;color:var(--text);">@' + escHtml(u.username || '') + '</div>'
          + '<div style="font-size:11px;color:var(--subtext);">' + (u.common_count || 0) + ' in common</div></div>'
          + '<button class="follow-btn ' + st + '" style="font-size:11px;padding:5px 12px;" onclick="event.stopPropagation();toggleFollow(' + u.id + ',\'' + st + '\',this);">' + lbl + '</button></div>';
      }).join('')
      + (owners.length > 5 ? '<div style="font-size:12px;color:var(--subtext);text-align:center;padding:8px 0;">+ ' + (owners.length - 5) + ' more</div>' : '');
  } catch(e) {}
}

// ── Profile settings section (inside Settings panel) ─────────
function renderProfileSettingsSection() {
  const el = document.getElementById('profile-settings-section');
  if (!el || !CURRENT_USER) return;
  const u = CURRENT_USER;
  el.innerHTML = ''
    // Username
    + '<div style="margin-bottom:12px;"><div style="font-size:11px;color:var(--subtext);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;">Username</div>'
    + (u.username
        ? '<div style="display:flex;align-items:center;gap:8px;">'
          + '<div style="flex:1;font-size:14px;color:var(--text);background:var(--card);border:var(--border-w) solid var(--border);border-radius:var(--radius);padding:10px 14px;">@' + escHtml(u.username) + '</div>'
          + '<button onclick="CURRENT_USER.username=null;renderProfileSettingsSection();" style="font-size:12px;color:var(--subtext);background:none;border:var(--border-w) solid var(--border);border-radius:var(--radius);padding:10px;cursor:pointer;font-family:inherit;">Change</button>'
          + '</div>'
        : '<div style="display:flex;gap:8px;">'
          + '<input id="settings-username-input" type="text" placeholder="Pick a username..." autocorrect="off" autocapitalize="none" spellcheck="false" maxlength="30" '
          + 'style="flex:1;background:var(--card);border:var(--border-w) solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:14px;color:var(--text);font-family:inherit;" '
          + 'oninput="this.value=this.value.toLowerCase();" onkeydown="if(event.key===\'Enter\')saveUsernameFromSettings();">'
          + '<button onclick="saveUsernameFromSettings()" style="background:var(--accent);border:none;color:var(--accent-text);border-radius:var(--radius);padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Save</button>'
          + '</div>')
    + '<div id="settings-username-error" style="font-size:11px;color:#e05050;min-height:16px;margin-top:4px;"></div></div>'
    // Privacy toggle
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:10px 0;border-top:var(--border-w) solid var(--border);border-bottom:var(--border-w) solid var(--border);">'
    + '<div><div style="font-size:13px;color:var(--text);">Public account</div>'
    + '<div style="font-size:11px;color:var(--subtext);margin-top:2px;">Anyone can follow without approval</div></div>'
    + '<button onclick="togglePrivacy()" style="width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;background:' + (u.isPublic ? 'var(--accent)' : 'var(--border)') + ';position:relative;transition:background 0.2s;">'
    + '<div style="position:absolute;top:2px;left:' + (u.isPublic ? '22' : '2') + 'px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left 0.2s;"></div></button>'
    + '</div>'
    // Bio
    + '<div style="margin-bottom:12px;"><div style="font-size:11px;color:var(--subtext);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;">Bio</div>'
    + '<textarea id="settings-bio" placeholder="Tell people about yourself..." rows="3" '
    + 'style="width:100%;background:var(--card);border:var(--border-w) solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--text);font-family:inherit;resize:none;">'
    + escHtml(u.bio || '') + '</textarea></div>'
    // Setup
    + '<div style="margin-bottom:12px;"><div style="font-size:11px;color:var(--subtext);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;">Your setup</div>'
    + (u.setupPhoto ? '<img src="' + escHtml(u.setupPhoto) + '" style="width:100%;border-radius:var(--radius);margin-bottom:8px;max-height:200px;object-fit:cover;">' : '')
    + '<textarea id="settings-setup-desc" placeholder="Describe your turntable, amp, speakers..." rows="2" '
    + 'style="width:100%;background:var(--card);border:var(--border-w) solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--text);font-family:inherit;resize:none;margin-bottom:6px;">'
    + escHtml(u.setupDescription || '') + '</textarea>'
    + '<input type="file" id="setup-photo-input" accept="image/*" style="display:none;" onchange="handleSetupPhoto(this)">'
    + '<button onclick="document.getElementById(\'setup-photo-input\').click()" style="font-size:12px;color:var(--subtext);background:var(--card);border:var(--border-w) solid var(--border);border-radius:var(--radius);padding:8px 12px;cursor:pointer;font-family:inherit;">📷 ' + (u.setupPhoto ? 'Change photo' : 'Add photo') + '</button></div>'
    // Storage
    + '<div style="margin-bottom:12px;"><div style="font-size:11px;color:var(--subtext);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;">How you store</div>'
    + (u.storagePhoto ? '<img src="' + escHtml(u.storagePhoto) + '" style="width:100%;border-radius:var(--radius);margin-bottom:8px;max-height:200px;object-fit:cover;">' : '')
    + '<textarea id="settings-storage-desc" placeholder="How do you store and display your records?" rows="2" '
    + 'style="width:100%;background:var(--card);border:var(--border-w) solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--text);font-family:inherit;resize:none;margin-bottom:6px;">'
    + escHtml(u.storageDescription || '') + '</textarea>'
    + '<input type="file" id="storage-photo-input" accept="image/*" style="display:none;" onchange="handleStoragePhoto(this)">'
    + '<button onclick="document.getElementById(\'storage-photo-input\').click()" style="font-size:12px;color:var(--subtext);background:var(--card);border:var(--border-w) solid var(--border);border-radius:var(--radius);padding:8px 12px;cursor:pointer;font-family:inherit;">📷 ' + (u.storagePhoto ? 'Change photo' : 'Add photo') + '</button></div>'
    // Save
    + '<button onclick="saveProfile()" style="width:100%;background:var(--accent);border:none;color:var(--accent-text);border-radius:var(--radius);padding:11px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Save profile</button>'
    + '<div id="profile-save-status" style="font-size:11px;color:var(--subtext);text-align:center;margin-top:8px;min-height:16px;"></div>';
}

async function saveUsernameFromSettings() {
  const input = document.getElementById('settings-username-input');
  const errEl = document.getElementById('settings-username-error');
  const username = (input ? input.value : '').trim().toLowerCase();
  if (!/^[a-z0-9._-]{2,30}$/.test(username)) {
    if (errEl) errEl.textContent = 'Must be 2–30 chars: letters, numbers, dots, hyphens, underscores.';
    return;
  }
  try {
    await apiPost('/api/auth/username', { username });
    CURRENT_USER.username = username;
    renderProfileSettingsSection();
  } catch(e) {
    if (errEl) errEl.textContent = e.message || 'Username already taken.';
  }
}

async function togglePrivacy() {
  const newVal = !CURRENT_USER.isPublic;
  try {
    await apiPost('/api/auth/privacy', { isPublic: newVal });
    CURRENT_USER.isPublic = newVal;
    renderProfileSettingsSection();
  } catch(e) { alert('Could not update privacy setting.'); }
}

async function saveProfile() {
  const bio = (document.getElementById('settings-bio') || {}).value || '';
  const setupDesc = (document.getElementById('settings-setup-desc') || {}).value || '';
  const storageDesc = (document.getElementById('settings-storage-desc') || {}).value || '';
  const statusEl = document.getElementById('profile-save-status');
  if (statusEl) statusEl.textContent = 'Saving...';
  try {
    await apiPost('/api/auth/profile', { bio, setupDescription: setupDesc, storageDescription: storageDesc });
    CURRENT_USER.bio = bio; CURRENT_USER.setupDescription = setupDesc; CURRENT_USER.storageDescription = storageDesc;
    if (statusEl) { statusEl.textContent = '✓ Saved'; setTimeout(function() { if (statusEl) statusEl.textContent = ''; }, 2000); }
  } catch(e) { if (statusEl) statusEl.textContent = 'Could not save. Try again.'; }
}

function handleSetupPhoto(input) {
  const file = input.files && input.files[0];
  if (!file || file.size > 3 * 1024 * 1024) { alert('Please choose an image under 3MB.'); return; }
  const reader = new FileReader();
  reader.onload = async function(e) {
    try { await apiPost('/api/auth/setup-photo', { photoUrl: e.target.result }); CURRENT_USER.setupPhoto = e.target.result; renderProfileSettingsSection(); }
    catch(err) { alert('Could not save photo.'); }
  };
  reader.readAsDataURL(file);
}

function handleStoragePhoto(input) {
  const file = input.files && input.files[0];
  if (!file || file.size > 3 * 1024 * 1024) { alert('Please choose an image under 3MB.'); return; }
  const reader = new FileReader();
  reader.onload = async function(e) {
    try { await apiPost('/api/auth/storage-photo', { photoUrl: e.target.result }); CURRENT_USER.storagePhoto = e.target.result; renderProfileSettingsSection(); }
    catch(err) { alert('Could not save photo.'); }
  };
  reader.readAsDataURL(file);
}

applyTheme(currentTheme);
init();
</script>
</body>
</html>
