<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Wax — Vinyl Collection</title>
<style>
  :root {
    --bg: #1a1410; --card: #241c10; --accent: #c47f1a; --accent-text: #1a1410;
    --text: #f0c870; --subtext: #7a6040; --border: #3a2c18; --disc: #5a4020;
    --artbg: #2a2018; --title-font: system-ui,sans-serif; --label-font: system-ui,sans-serif;
    --title-size: 13px; --radius: 6px; --art-height: 88px; --disc-size: 64px;
    --density: 8px; --border-w: 0.5px; --btn-shape: 8px;
    --surface: rgba(0,0,0,0.35); --surface-border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #111; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
  body { display: flex; justify-content: center; align-items: flex-start; height: 100vh; height: 100dvh; padding: 0; }

  /* App shell - mobile frame */
  #app {
    width: 100%; max-width: 430px; height: 100vh; height: 100dvh;
    background: var(--bg); position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    transition: background 0.3s;
  }
  .bg-skin {
    position: absolute; inset: 0; z-index: 0;
    background-size: cover; background-position: center;
    transition: opacity 0.4s;
    pointer-events: none;
  }
  .app-content { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

  /* Nav */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 52px 20px 16px; position: sticky; top: 0; z-index: 100;
    background: var(--bg); border-bottom: var(--border-w) solid var(--border);
    transition: background 0.3s;
  }
  .nav-title { font-size: 22px; font-weight: 700; color: var(--text); font-family: var(--title-font); letter-spacing: -0.5px; }
  .nav-sub { font-size: 11px; color: var(--subtext); margin-top: 1px; }
  .nav-btn { background: none; border: var(--border-w) solid var(--border); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--subtext); font-size: 16px; transition: all 0.15s; }
  .nav-btn:hover { background: var(--card); color: var(--text); }

  /* Search + filter bar */
  .search-bar { padding: 12px 16px; display: flex; gap: 8px; align-items: center; }
  .search-wrap { flex: 1; position: relative; }
  .search-input {
    width: 100%; background: var(--card); border: var(--border-w) solid var(--border);
    border-radius: 22px; padding: 9px 14px 9px 36px; font-size: 14px;
    color: var(--text); outline: none; font-family: inherit;
    transition: border-color 0.15s;
  }
  .search-input::placeholder { color: var(--subtext); }
  .search-input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--subtext); font-size: 15px; pointer-events: none; }
  .filter-btn { background: var(--card); border: var(--border-w) solid var(--border); border-radius: 22px; padding: 9px 12px; font-size: 13px; color: var(--subtext); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .filter-btn:hover, .filter-btn.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }

  /* Filter chips */
  .chip-row { display: flex; gap: 6px; padding: 0 16px 12px; overflow-x: auto; scrollbar-width: none; }
  .chip-row::-webkit-scrollbar { display: none; }
  .chip { font-size: 11px; background: var(--card); border: var(--border-w) solid var(--border); border-radius: 16px; padding: 5px 12px; color: var(--subtext); cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
  .chip.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }

  /* View toggle */
  .view-toggle { display: flex; gap: 4px; padding: 0 16px 12px; }
  .view-btn { flex: 1; background: var(--card); border: var(--border-w) solid var(--border); border-radius: var(--radius); padding: 7px; font-size: 11px; color: var(--subtext); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: all 0.15s; }
  .view-btn.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }

  /* ── PHASE A: SOCIAL / FRIENDS ── */

  /* Extra bottom padding so content clears the tab bar */
  .collection { flex: 1; overflow-y: auto; padding: 0 12px 80px; }

  /* Friends view container */
  .friends-view { flex: 1; overflow-y: auto; padding-bottom: 20px; }

  /* User row (following/followers/search results) */
  .user-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-bottom: var(--border-w) solid var(--border);
    cursor: pointer; transition: background 0.15s;
  }
  .user-row:hover { background: var(--card); }
  .user-avatar-sm {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; overflow: hidden; font-size: 18px; font-weight: 700;
    color: var(--accent-text);
  }
  .user-info { flex: 1; min-width: 0; }
  .user-handle { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-sub { font-size: 11px; color: var(--subtext); margin-top: 2px; }

  /* Follow button states */
  .follow-btn {
    font-size: 12px; font-weight: 600; padding: 7px 16px;
    border-radius: 20px; cursor: pointer; border: none;
    font-family: inherit; white-space: nowrap; flex-shrink: 0; transition: all 0.15s;
  }
  .follow-btn.none { background: var(--accent); color: var(--accent-text); }
  .follow-btn.pending { background: transparent; border: var(--border-w) solid var(--border); color: var(--subtext); }
  .follow-btn.accepted { background: transparent; border: var(--border-w) solid var(--border); color: var(--text); }

  /* Pending request row (accept / decline) */
  .req-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .req-accept { background: var(--accent); color: var(--accent-text); border: none; border-radius: 16px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .req-decline { background: transparent; border: var(--border-w) solid var(--border); color: var(--text); border-radius: 16px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: inherit; }

  /* Friends tab badge */
  .tab-badge {
    position: absolute; top: -4px; right: -6px;
    min-width: 14px; height: 14px; border-radius: 7px;
    background: #e05050; font-size: 8px; color: #fff;
    text-align: center; line-height: 14px; font-weight: 700;
    padding: 0 3px; pointer-events: none;
  }

  /* Profile overlay (slides up like detail) */
  .profile-overlay {
    position: fixed; inset: 0; z-index: 520; background: var(--bg);
    transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    overflow-y: auto; max-width: 430px; left: 50%; margin-left: -215px;
  }
  .profile-overlay.open { transform: translateY(0); }

  /* Profile header */
  .profile-hero { padding: 52px 20px 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center; background: var(--card); border-bottom: var(--border-w) solid var(--border); }
  .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; color: var(--accent-text); overflow: hidden; border: 3px solid var(--border); }
  .profile-username { font-size: 20px; font-weight: 700; color: var(--text); }
  .profile-displayname { font-size: 13px; color: var(--subtext); margin-top: -6px; }
  .profile-stats { display: flex; gap: 24px; }
  .profile-stat { text-align: center; }
  .profile-stat-num { font-size: 18px; font-weight: 700; color: var(--accent); }
  .profile-stat-lbl { font-size: 10px; color: var(--subtext); }

  /* Locked collection overlay */
  .locked-collection { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px; text-align: center; gap: 12px; }

  /* Username gate modal */
  .gate-overlay {
    position: fixed; inset: 0; z-index: 600; background: rgba(0,0,0,0.7);
    display: flex; align-items: flex-end; justify-content: center;
  }
  .gate-sheet {
    background: var(--bg); border-radius: 16px 16px 0 0;
    padding: 24px 24px 48px; width: 100%; max-width: 430px;
    border-top: var(--border-w) solid var(--border);
  }

  /* Section header inside friends/profile views */
  .section-hdr {
    font-size: 10px; font-weight: 600; color: var(--subtext);
    text-transform: uppercase; letter-spacing: 0.07em;
    padding: 14px 16px 8px; border-bottom: var(--border-w) solid var(--border);
    background: var(--bg);
  }

  @media (min-width: 430px) {
    .profile-overlay { max-width: 430px; margin-left: -215px; left: 50%; }
  }
  @media (min-width: 768px) {
    .profile-overlay { max-width: 720px !important; margin-left: -360px !important; left: 50% !important; }
  }
  .grid-view { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .list-view { display: flex; flex-direction: column; gap: 8px; }

  /* Record card - grid */
  .record-card {
    background: var(--card); border: var(--border-w) solid var(--border);
    border-radius: var(--radius); overflow: hidden; cursor: pointer;
    transition: transform 0.15s, border-color 0.15s; position: relative;
  }
  .record-card:active { transform: scale(0.97); }
  .record-card:hover { border-color: var(--accent); }
  .record-art-wrap { position: relative; width: 100%; background: var(--artbg); overflow: hidden; }
  .record-art { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; background: var(--artbg); display: block; }
  .record-art-placeholder { position: absolute; inset: 0; width: 100%; height: 100%; background: var(--artbg); display: flex; align-items: center; justify-content: center; }
  .disc-icon { width: 52px; height: 52px; border-radius: 50%; background: var(--disc); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; }
  .disc-hole { width: 8px; height: 8px; border-radius: 50%; background: var(--bg); }
  .record-info { padding: 8px 10px; }
  .record-title-text { font-size: 12px; font-weight: 500; color: var(--text); font-family: var(--title-font); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  .record-artist { font-size: 10px; color: var(--subtext); font-family: var(--label-font); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .record-year { font-size: 10px; color: var(--subtext); margin-top: 3px; }

  /* Record card - list */
  .record-list-item {
    background: var(--card); border: var(--border-w) solid var(--border);
    border-radius: var(--radius); display: flex; align-items: center; gap: 12px;
    padding: 10px; cursor: pointer; transition: transform 0.15s, border-color 0.15s;
  }
  .record-list-item:active { transform: scale(0.98); }
  .record-list-item:hover { border-color: var(--accent); }
  .list-art { width: 52px; height: 52px; border-radius: calc(var(--radius) - 2px); object-fit: cover; flex-shrink: 0; background: var(--artbg); }
  .list-art-placeholder { width: 52px; height: 52px; border-radius: calc(var(--radius) - 2px); background: var(--artbg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .list-info { flex: 1; min-width: 0; }
  .list-title { font-size: 13px; font-weight: 500; color: var(--text); font-family: var(--title-font); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
  .list-artist { font-size: 11px; color: var(--subtext); font-family: var(--label-font); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-meta { display: flex; gap: 6px; margin-top: 4px; }
  .meta-tag { font-size: 9px; background: var(--surface); border: 0.5px solid var(--surface-border); border-radius: 4px; padding: 2px 6px; color: var(--subtext); }
  .list-chevron { color: var(--subtext); font-size: 14px; flex-shrink: 0; }

  /* Stats bar */
  .stats-bar { display: flex; gap: 8px; padding: 8px 16px 4px; }
  .stat { flex: 1; background: var(--card); border: var(--border-w) solid var(--border); border-radius: var(--radius); padding: 8px; text-align: center; }
  .stat-num { font-size: 18px; font-weight: 700; color: var(--accent); font-family: var(--title-font); }
  .stat-lbl { font-size: 9px; color: var(--subtext); margin-top: 1px; }

  /* Bottom tab bar — CSS grid guarantees equal columns regardless of content */
  .tab-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    flex-shrink: 0;
    background: var(--bg); border-top: var(--border-w) solid var(--border);
    padding: 8px 0 env(safe-area-inset-bottom, 20px);
    z-index: 200; transition: background 0.3s;
  }
  .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 0; }
  .tab-item .ti { font-size: 22px; color: var(--subtext); transition: color 0.15s; }
  .tab-item.active .ti { color: var(--accent); }
  .tab-item span { font-size: 9px; color: var(--subtext); transition: color 0.15s; }
  .tab-item.active span { color: var(--accent); }

  /* Random picker button (floating) */
  .fab {
    position: fixed; bottom: 20px; right: calc(50% - 215px + 16px);
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: var(--accent-text); z-index: 150;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4); transition: transform 0.15s;
  }
  .fab:active { transform: scale(0.92); }

  /* Loading state */
  .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 16px; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:0.8;} 50%{transform:scale(1.08);opacity:1;} }
  @keyframes artExpand { 0%{opacity:0;transform:scale(0.6) translateY(20px);} 60%{transform:scale(1.03) translateY(-2px);} 100%{opacity:1;transform:scale(1) translateY(0);} }
  @keyframes artCollapse { 0%{opacity:1;transform:scale(1);} 100%{opacity:0;transform:scale(0.5) translateY(30px);} }
  #art-big { transform-origin: center bottom; }
  #art-expanded { overflow: hidden; }
  @keyframes reveal { 0%{opacity:0;transform:translateY(20px);} 100%{opacity:1;transform:translateY(0);} }
  .loading-text { font-size: 13px; color: var(--subtext); }

  /* Token setup screen */
  .setup-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; gap: 20px; text-align: center; }
  .setup-disc { width: 80px; height: 80px; border-radius: 50%; background: var(--card); border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; margin: 0 auto; }
  .setup-disc .disc-hole-lg { width: 14px; height: 14px; border-radius: 50%; background: var(--bg); }
  .setup-title { font-size: 22px; font-weight: 700; color: var(--text); font-family: var(--title-font); }
  .setup-sub { font-size: 13px; color: var(--subtext); line-height: 1.6; max-width: 280px; }
  .token-input { width: 100%; background: var(--card); border: var(--border-w) solid var(--border); border-radius: var(--radius); padding: 12px 16px; font-size: 13px; color: var(--text); outline: none; font-family: 'Courier New', monospace; transition: border-color 0.15s; }
  .token-input:focus { border-color: var(--accent); }
  .token-btn { width: 100%; background: var(--accent); border: none; border-radius: var(--btn-shape); padding: 14px; font-size: 14px; font-weight: 600; color: var(--accent-text); cursor: pointer; transition: opacity 0.15s; font-family: inherit; }
  .token-btn:hover { opacity: 0.88; }

  /* Record detail overlay */
  .detail-overlay {
    position: fixed; inset: 0; z-index: 500; background: var(--bg);
    transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    overflow-y: auto; max-width: 430px; left: 50%; margin-left: -215px;
  }
  .detail-overlay.open { transform: translateY(0); }
  .detail-hero { width: 100%; aspect-ratio: 1; object-fit: cover; background: var(--artbg); display: block; }
  .detail-hero-placeholder { width: 100%; aspect-ratio: 1; background: var(--artbg); display: flex; align-items: center; justify-content: center; }
  .detail-hero-disc { width: 120px; height: 120px; border-radius: 50%; background: var(--disc); border: 4px solid var(--border); display: flex; align-items: center; justify-content: center; }
  .detail-hero-hole { width: 18px; height: 18px; border-radius: 50%; background: var(--artbg); }
  .detail-back { position: sticky; top: 0; z-index: 10; display: flex; align-items: center; padding: 48px 16px 12px; background: linear-gradient(to bottom, var(--bg) 60%, transparent); }
  .detail-back-btn { background: rgba(0,0,0,0.5); border: 0.5px solid rgba(255,255,255,0.15); border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 16px; }
  .detail-body { padding: 0 20px 100px; }
  .detail-title { font-size: 26px; font-weight: 700; color: var(--text); font-family: var(--title-font); line-height: 1.2; margin-bottom: 4px; }
  .detail-artist { font-size: 16px; color: var(--accent); margin-bottom: 20px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .detail-chip { background: var(--card); border: var(--border-w) solid var(--border); border-radius: var(--radius); padding: 10px 12px; }
  .detail-chip-label { font-size: 9px; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .detail-chip-val { font-size: 13px; font-weight: 500; color: var(--text); }
  .detail-section-title { font-size: 11px; font-weight: 500; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; margin-top: 20px; }
  .tracklist-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: var(--border-w) solid var(--border); }
  .track-num { font-size: 11px; color: var(--subtext); min-width: 20px; text-align: right; }
  .track-title { font-size: 13px; color: var(--text); flex: 1; }
  .track-dur { font-size: 11px; color: var(--subtext); }
  .ai-chat-btn { width: 100%; background: var(--accent); border: none; border-radius: var(--btn-shape); padding: 16px; font-size: 15px; font-weight: 600; color: var(--accent-text); cursor: pointer; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; }

  /* Random picker overlay */
  .random-overlay {
    position: fixed; inset: 0; z-index: 600; background: rgba(0,0,0,0.92);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    max-width: 430px; left: 50%; margin-left: -215px;
  }
  .random-overlay.open { opacity: 1; pointer-events: all; }
  .random-card { background: var(--card); border: var(--border-w) solid var(--border); border-radius: 16px; overflow: hidden; width: 260px; }
  .random-art { width: 100%; aspect-ratio: 1; object-fit: cover; background: var(--artbg); }
  .random-art-placeholder { width: 100%; aspect-ratio: 1; background: var(--artbg); display: flex; align-items: center; justify-content: center; }
  .random-info { padding: 16px; }
  .random-title { font-size: 18px; font-weight: 700; color: var(--text); font-family: var(--title-font); margin-bottom: 4px; }
  .random-artist { font-size: 13px; color: var(--accent); margin-bottom: 12px; }
  .random-actions { display: flex; gap: 8px; margin-top: 16px; }
  .random-btn-sec { flex: 1; background: var(--card); border: var(--border-w) solid var(--border); border-radius: var(--radius); padding: 10px; font-size: 12px; color: var(--text); cursor: pointer; text-align: center; font-family: inherit; }
  .random-btn-pri { flex: 1; background: var(--accent); border: none; border-radius: var(--radius); padding: 10px; font-size: 12px; color: var(--accent-text); cursor: pointer; font-weight: 600; font-family: inherit; }
  .random-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.1em; }

  /* Settings panel */
  .settings-panel {
    position: fixed; inset: 0; z-index: 400; background: var(--bg);
    transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    max-width: 430px; left: 50%; margin-left: -215px;
    display: flex; flex-direction: column;
  }
  .settings-panel.open { transform: translateX(0); }
  .settings-header { padding: 52px 20px 16px; border-bottom: var(--border-w) solid var(--border); display: flex; align-items: center; gap: 12px; }
  .settings-title { font-size: 20px; font-weight: 700; color: var(--text); flex: 1; }

  /* STICKY theme preview */
  .theme-preview-sticky {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg); padding: 12px 16px;
    border-bottom: var(--border-w) solid var(--border);
  }
  .theme-preview-card {
    background: var(--card); border: var(--border-w) solid var(--border);
    border-radius: var(--radius); padding: 12px; display: flex; align-items: center; gap: 12px;
  }
  .preview-disc-sm { width: 44px; height: 44px; border-radius: 50%; background: var(--disc); border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .preview-disc-sm .hole { width: 7px; height: 7px; border-radius: 50%; background: var(--bg); }
  .preview-info { flex: 1; min-width: 0; }
  .preview-rec-title { font-size: 13px; font-weight: 500; color: var(--text); font-family: var(--title-font); margin-bottom: 2px; transition: all 0.2s; }
  .preview-rec-sub { font-size: 10px; color: var(--subtext); font-family: var(--label-font); transition: all 0.2s; }

  /* ── AI CHAT ── */


  .chat-panel {
    position: fixed; inset: 0; z-index: 510;

  /* Compact record header in chat */

  /* Suggested prompts */
  .chat-suggestions { display: flex; gap: 6px; padding: 0 16px 10px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }

function applyTheme(t, save) {
  const r = document.documentElement;
  r.style.setProperty('--bg', t.bg);
  r.style.setProperty('--card', t.card);
  r.style.setProperty('--accent', t.accent);
  r.style.setProperty('--accent-text', t.accenttext);
  r.style.setProperty('--text', t.text);
  r.style.setProperty('--subtext', t.subtext);
  r.style.setProperty('--border', t.border);
  r.style.setProperty('--disc', t.disc);
  r.style.setProperty('--artbg', t.artbg);
  r.style.setProperty('--title-font', t.titleFont);
  r.style.setProperty('--label-font', t.labelFont);
  r.style.setProperty('--radius', (t.radius||6)+'px');
  r.style.setProperty('--border-w', t.borderW||'0.5px');
  r.style.setProperty('--btn-shape', t.btnShape||'8px');
  r.style.setProperty('--density', (t.density||8)+'px');
  currentTheme = t;
  if (save !== false) localStorage.setItem('wax_theme', t.id);
}

function getToken() { return localStorage.getItem('wax_token') || ''; }
function setToken(t) { localStorage.setItem('wax_token', t); }
function clearToken() { localStorage.removeItem('wax_token'); }

async function apiGet(endpoint) {
  const token = getToken();
  const res = await fetch(endpoint, {
    headers: token ? { 'Authorization': 'Bearer ' + token } : {}
  });
  if (res.status === 401) throw new Error('not_authenticated');
  if (res.status === 403) {
    const data = await res.json().catch(() => ({}));
    const err = new Error('403');
    err.data = data;
    throw err;
  }
  if (!res.ok) throw new Error('API error ' + res.status);
  return res.json();
}

async function apiPost(endpoint, body) {
  const token = getToken();
  const res = await fetch(endpoint, {
    method: 'POST',
    headers: Object.assign({ 'Content-Type': 'application/json' }, token ? { 'Authorization': 'Bearer ' + token } : {}),
    body: JSON.stringify(body || {})
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) {
    const err = new Error(data.error || 'Request failed');
    err.data = data;
    throw err;
  }
  return data;
}

async function apiDelete(endpoint) {
  const token = getToken();
  const res = await fetch(endpoint, {
    method: 'DELETE',
    headers: token ? { 'Authorization': 'Bearer ' + token } : {}
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function artImg(url, cls, placeholder) {
  const inner = (url && url !== 'https://st.discogs.com/')
    ? `<img class="${cls}" src="${url}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="${cls.replace('record-art','record-art-placeholder').replace('list-art','list-art-placeholder')}" style="display:none;">${placeholder}</div>`
    : `<div class="${cls.replace('record-art','record-art-placeholder').replace('list-art','list-art-placeholder')}">${placeholder}</div>`;
  // Grid art uses a fixed-aspect wrapper (padding-top:100%) instead of CSS aspect-ratio,
  // which can fail to reserve layout space in Safari when there are many lazy-loaded
  // images inside a CSS Grid container — exactly the case with a large synced collection.
  return cls === 'record-art' ? `<div class="record-art-wrap">${inner}</div>` : inner;
}

const discPlaceholder = `<div class="disc-icon"><div class="disc-hole"></div></div>`;
const discPlaceholderSm = `<div style="width:28px;height:28px;border-radius:50%;background:var(--disc);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;"><div style="width:5px;height:5px;border-radius:50%;background:var(--artbg);"></div></div>`;

// Explicitly sets each grid card's height in pixels, computed from its actual
// measured width plus its info block's height. Two different approaches that
// let CSS Grid auto-size the row from content (a padding-top percentage trick,
// then a height set on a descendant) both proved unreliable at ~260 items in
// testing. Setting an explicit, definite height directly on the grid item
// itself removes all ambiguity from Grid's auto-row-sizing algorithm — there's
// nothing left for it to get wrong. Reads are batched before writes to avoid
// layout thrashing across hundreds of nodes.
function sizeGridArt() {
  const cards = document.querySelectorAll('.record-card');
  if (!cards.length) return;
  const measurements = Array.prototype.map.call(cards, function(card) {
    const wrap = card.querySelector('.record-art-wrap');
    const info = card.querySelector('.record-info');
    return { card: card, wrap: wrap, width: card.offsetWidth, infoHeight: info ? info.offsetHeight : 0 };
  });
  measurements.forEach(function(m) {
    if (m.wrap) m.wrap.style.height = m.width + 'px';
    m.card.style.height = (m.width + m.infoHeight) + 'px';
  });
}

  const counter = document.getElementById('art-counter');

  bigImg.src = srcs[idx];
  counter.textContent = (idx+1) + ' / ' + srcs.length;

  if (!wasExpanded) {
    // Animate in from thumbnail
    expanded.style.display = 'block';
    bigImg.style.animation = 'none';
    bigImg.offsetHeight; // force reflow
    bigImg.style.animation = 'artExpand 0.38s cubic-bezier(0.34,1.56,0.64,1) forwards';
  } else {
    // Already expanded - quick crossfade to new image
    bigImg.style.opacity = '0.5';
    bigImg.style.transition = 'opacity 0.15s';
    setTimeout(() => { bigImg.style.opacity = '1'; }, 150);
  }

  // Highlight active thumb
  car.querySelectorAll('#art-thumbs img').forEach((img, i) => {
    img.style.borderColor = i === idx ? 'var(--accent)' : 'var(--border)';
    img.style.opacity = i === idx ? '1' : '0.6';
    img.style.transition = 'opacity 0.2s, border-color 0.2s';
  });

  const thumbs = car.querySelectorAll('#art-thumbs img');
  if (thumbs[idx]) thumbs[idx].scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
}

function artNav(dir) {
  const car = document.getElementById('art-carousel');
  if (!car) return;
  const srcs = window._artSrcs || [];
  let idx = parseInt(car.dataset.current) + dir;
  if (idx < 0) idx = srcs.length - 1;
  if (idx >= srcs.length) idx = 0;
  artThumbTap(idx);
}

function artCollapse() {
  const car = document.getElementById('art-carousel');
  if (!car) return;
  car.dataset.expanded = 'false';
  const bigImg = document.getElementById('art-big');
  const expanded = document.getElementById('art-expanded');
  bigImg.style.animation = 'none';

async function removeRecord() {
  if (!currentRecord || !currentRecord.manual_db_id) return;
  const title = currentRecord.basic_information?.title || 'this record';
  if (!confirm('Remove "' + title + '" from your collection? This can\'t be undone.')) return;
  try {
    await apiDelete('/api/records/' + currentRecord.manual_db_id);
    closeDetail();
    showLoading('Updating your collection...');
    const data = await fetchCollection();
    releases = data.releases || [];
    filtered = [...releases];
    renderApp();
  } catch(e) {
    alert('Could not remove that record. Please try again.');
  }
}

function runCrateDig(c) {
  // 45 records, winner placed in last third so there's a good run-up
  const pool = [...releases].sort(() => Math.random()-0.5).slice(0,45);
  const finalIdx = 30 + Math.floor(Math.random() * 10); // land between index 30-39
  pool[finalIdx] = randomRecord;
  const W = Math.min(window.innerWidth, 430);
  const ITEM_W = 160; const GAP = 8; const STEP = ITEM_W + GAP;
  c.innerHTML = `
    <p style="font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.1em;">Digging the crates...</p>
    <div style="width:${W}px;overflow:hidden;position:relative;height:170px;display:flex;align-items:center;">
      <div id="crate-strip" style="display:flex;gap:${GAP}px;position:absolute;left:0;">
        ${pool.map((r,i) => { const art = r.basic_information.cover_image||r.basic_information.thumb||'';
          return '<div id="ci'+i+'" style="width:'+ITEM_W+'px;height:160px;border-radius:10px;overflow:hidden;flex-shrink:0;border:2px solid transparent;transition:border-color 0.2s;">'+(art&&art!='https://st.discogs.com/'?'<img src="'+art+'" style="width:100%;height:100%;object-fit:cover;">':"<div style='width:100%;height:100%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:36px;'>🎵</div>")+'</div>';
        }).join('')}
      </div>
    </div>
    <div id="crate-result" style="opacity:0;transition:opacity 0.4s;text-align:center;"></div>`;
  const strip = document.getElementById('crate-strip');
  const center = W/2 - ITEM_W/2;
  const target = finalIdx * STEP;
  let pos = 0;
  // Phase 1: ramp up to full speed quickly
  // Phase 2: cruise at high speed
  // Phase 3: fast deceleration to target
  let phase = 1;
  let speed = 8;
  const MAX_SPEED = 55;
  const CRUISE_UNTIL = target - 600; // start slowing 600px before target

  function tick() {
    if (phase === 1) {
      speed = Math.min(speed * 1.15, MAX_SPEED);
      if (speed >= MAX_SPEED) phase = 2;
    }
    if (phase === 2) {
      if (pos >= CRUISE_UNTIL) phase = 3;
    }
    if (phase === 3) {
      // Quick ease into target
      const remaining = target - pos;
      speed = Math.max(3, remaining * 0.12);
      if (remaining <= 3) {
        pos = target;
        strip.style.transform = 'translateX('+(center-pos)+'px)';
        const item = document.getElementById('ci'+finalIdx);
        if (item) item.style.borderColor = 'var(--accent)';
        soundCrateThud();
        setTimeout(() => {
          const bi = randomRecord.basic_information;
          document.getElementById('crate-result').style.opacity='1';
          document.getElementById('crate-result').innerHTML='<p style="font-size:16px;font-weight:700;color:var(--text);margin:8px 0 2px;">'+escHtml(bi.title)+'</p><p style="font-size:13px;color:var(--accent);margin:0 0 8px;">'+escHtml(bi.artists[0]?.name||'')+'</p>'+pickerActions();
        }, 300);
        return;
      }
    }
    const prevItem = Math.floor((pos) / STEP);
    pos += speed;
    const newItem = Math.floor(pos / STEP);
    if (newItem !== prevItem && phase <= 2) soundCrateFlip();
    strip.style.transform = 'translateX('+(center-pos)+'px)';
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function runWheel(c) {
  const poolSize = Math.min(12, releases.length);
  const shuffled = [...releases].sort(() => Math.random()-0.5);
  const pool = shuffled.slice(0, poolSize);
  const existingIdx = pool.findIndex(r => r === randomRecord);
  if (existingIdx === -1) pool[Math.floor(Math.random()*poolSize)] = randomRecord;
  const size = 280, cx=size/2, cy=size/2, r=120;
  const n=pool.length, sa=(2*Math.PI)/n;
  const colors=['#c47f1a','#1a6cc4','#3a8a4a','#a03050','#c040e0','#7a5830','#1a8888','#884a1a','#888','#aa5500','#005588','#558800'];
  let rot=0, spinning=false;
  c.innerHTML=`<p style="font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;">Tap to spin</p>
    <div style="position:relative;width:${size}px;height:${size+36}px;">
      <canvas id="wc" width="${size}" height="${size}" style="cursor:pointer;border-radius:50%;box-shadow:0 0 30px rgba(0,0,0,0.5);" onclick="doSpin()"></canvas>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid #111;z-index:2;"></div>
      <!-- Ticker/clicker at bottom -->
      <div style="position:absolute;bottom:4px;left:50%;transform:translateX(-50%);z-index:3;display:flex;flex-direction:column;align-items:center;">
        <svg id="wheel-ticker" width="32" height="32" viewBox="0 0 32 32">
          <polygon points="16,4 28,28 4,28" fill="#c47f1a" stroke="#fff" stroke-width="1.5" style="filter:drop-shadow(0 0 4px #c47f1a);transform-origin:16px 28px;"/>
        </svg>
        <div style="width:24px;height:8px;background:linear-gradient(180deg,#3a2c18,#1a1410);border-radius:0 0 6px 6px;border:1px solid #c47f1a;margin-top:-2px;"></div>
      </div>
    </div>
    <div id="wheel-result" style="opacity:0;transition:opacity 0.5s;text-align:center;margin-top:8px;"></div>`;
  function draw(a){
    const canvas=document.getElementById('wc'); if(!canvas)return;
    const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,size,size);
    pool.forEach((rec,i)=>{
      const s=a+i*sa,e=s+sa;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,s,e);
      ctx.fillStyle=colors[i%colors.length]; ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1; ctx.stroke();
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(s+sa/2);
      ctx.textAlign='right'; ctx.fillStyle='#fff'; ctx.font='bold 8px system-ui';
      ctx.fillText((rec.basic_information.artists[0]?.name||'').substring(0,10),r-6,3);
      ctx.restore();
    });
  }
  window.doSpin=function(){
    if(spinning)return; spinning=true;
    const tidx=pool.findIndex(rec=>rec===randomRecord)<0?Math.floor(Math.random()*pool.length):pool.findIndex(rec=>rec===randomRecord);
    const tgt=-(tidx*sa+sa/2)+Math.PI/2;
    const total=5*2*Math.PI+tgt-(rot%(2*Math.PI));
    const dur=4000, t0=performance.now(), r0=rot;
    let lastTickAngle = 0;
    function fr(now){
      const p=Math.min((now-t0)/dur,1), e=1-Math.pow(1-p,4);
      rot=r0+total*e; draw(rot);

      // Tick sound + ticker animation when crossing a segment boundary
      const tickEvery = sa; // one tick per segment
      const currentTick = Math.floor(rot / tickEvery);
      if (currentTick !== lastTickAngle) {
        lastTickAngle = currentTick;
        soundWheelTick();
        // Animate ticker
        const ticker = document.getElementById('wheel-ticker');
        if (ticker) {
          const speed = total * (1-e) / dur; // approximate current angular speed
          const deflect = Math.min(30, Math.abs(speed) * 8);
          ticker.style.transform = 'rotate('+deflect+'deg)';
          ticker.style.transformOrigin = '16px 28px';
          setTimeout(() => { if(ticker) ticker.style.transform = 'rotate(0deg)'; ticker.style.transition='transform 0.15s'; }, 80);
        }
      }

      if(p<1){requestAnimationFrame(fr);}
      else{
        spinning=false;
        soundWheelTick(); soundWheelTick();
        const bi=randomRecord.basic_information;
        document.getElementById('wheel-result').style.opacity='1';
        document.getElementById('wheel-result').innerHTML='<p style="font-size:16px;font-weight:700;color:var(--text);margin:4px 0 2px;">'+escHtml(bi.title)+'</p><p style="font-size:13px;color:var(--accent);margin:0 0 8px;">'+escHtml(bi.artists[0]?.name||'')+'</p>'+pickerActions();
      }
    }
    requestAnimationFrame(fr);
  };
  draw(rot);
}

function scoreCollection() {
  const scores = releases.map(record => {
    const bi = record.basic_information;
    const genres = bi.genres || [];
    const styles = bi.styles || [];
    let score = 0;

    // Genre nudge — highest weight (multi-select: any match scores, all must match for bonus)
    if (vibeSelections.genre.length > 0) {
      const matchedGenres = vibeSelections.genre.filter(g => genres.includes(g));
      if (matchedGenres.length > 0) score += 10 * matchedGenres.length;
      else score -= 5; // none of the selected genres matched
    }

    // Mood match (multi-select: score for each matching mood)
    if (vibeSelections.mood.length > 0) {
      vibeSelections.mood.forEach(m => {
        const map = VIBE_MAP.mood[m];
        if (map) {
          map.genres.forEach(g => { if (genres.includes(g)) score += 3; });
          map.styles.forEach(s => { if (styles.includes(s)) score += 2; });
        }
      });
    }



    // Setting match
    if (vibeSelections.setting) {
      const map = VIBE_MAP.setting[vibeSelections.setting];
      if (map) {
        map.genres.forEach(g => { if (genres.includes(g)) score += 2; });
        map.styles.forEach(s => { if (styles.includes(s)) score += 1; });
      }
    }

    return { record, score };
  });

  // Return records with positive scores, sorted by score
  return scores.filter(s => s.score > 0).sort((a, b) => b.score - a.score);
}

function showTrackPicker(bi) {
  const body = document.getElementById('lyrics-body');

  // Get tracklist from full release data if available, fallback to basic
  const tracks = (window._currentReleaseData && window._currentReleaseData.tracklist)
    ? window._currentReleaseData.tracklist.filter(t => t.type_ !== 'heading' && t.title)
    : [];

  if (tracks.length === 0) {
    body.innerHTML = '<p style="color:var(--subtext);font-size:13px;text-align:center;margin-top:40px;">Loading track list...<br><br>'
      + '<span style="font-size:11px;">Open the record detail first to load tracks.</span></p>';
    return;
  }

  let html = '<p style="font-size:11px;color:var(--subtext);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;">Select a track</p>';
  let sideLabel = '';
  tracks.forEach((t, i) => {
    const pos = t.position || '';
    const newSide = pos.match(/^[A-Z]/)?.[0];
    if (newSide && newSide !== sideLabel) {
      sideLabel = newSide;
      html += '<p style="font-size:10px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;padding:10px 0 4px;">Side ' + sideLabel + '</p>';
    }
    html += '<div onclick="fetchLyrics(' + i + ')" style="display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:var(--border-w) solid var(--border);cursor:pointer;">'
      + '<span style="font-size:11px;color:var(--subtext);min-width:20px;text-align:right;">' + escHtml(pos) + '</span>'
      + '<span style="font-size:14px;color:var(--text);flex:1;">' + escHtml(t.title) + '</span>'
      + (t.duration ? '<span style="font-size:11px;color:var(--subtext);">' + escHtml(t.duration) + '</span>' : '')
      + '<span style="font-size:14px;color:var(--subtext);">›</span>'
      + '</div>';
  });

  body.innerHTML = html;
}

async function fetchLyrics(trackIdx) {
  if (!currentRecord || !window._currentReleaseData) return;
  const bi = currentRecord.basic_information;
  const tracks = window._currentReleaseData.tracklist.filter(function(t) { return t.type_ !== 'heading' && t.title; });
  const track = tracks[trackIdx];
  if (!track) return;

  const artist = bi.artists?.[0]?.name || '';
  const song = track.title;
  const body = document.getElementById('lyrics-body');

  body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px;">'
    + '<div style="width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;"></div>'
    + '<p style="font-size:13px;color:var(--subtext);">Finding lyrics...</p>'
    + '</div>';

  // Try multiple name variants for better API coverage
  const cleanArtist = artist.split('(')[0].split('feat')[0].trim();
  const cleanSong = song.split('(')[0].trim();
  const cleanArtist2 = cleanArtist.replace(/[^a-zA-Z0-9 ]/g, '').trim();
  const cleanSong2 = cleanSong.replace(/[^a-zA-Z0-9 ]/g, '').trim();

  const attempts = [
    [cleanArtist, cleanSong],
    [cleanArtist2, cleanSong],
    [cleanArtist, cleanSong2],
    [cleanArtist2, cleanSong2],
  ];

  let found = null;
  for (let i = 0; i < attempts.length && !found; i++) {
    const a = attempts[i][0];
    const s = attempts[i][1];
    if (!a || !s) continue;
    try {
      const url = 'https://api.lyrics.ovh/v1/' + encodeURIComponent(a) + '/' + encodeURIComponent(s);
      const res = await fetch(url);
      if (res.ok) {
        const data = await res.json();
        if (data.lyrics && data.lyrics.trim().length > 10) {
          found = data.lyrics.trim();
        }
      }
    } catch(e) {}
  }

  if (found) {
    showLyricsText(song, artist, found);
  } else {
    // Fall back to Genius
    body.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px;">'
      + '<div style="width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;"></div>'
      + '<p style="font-size:13px;color:var(--subtext);">Trying Genius...</p>'
      + '</div>';
    try {
      const gData = await apiGet('/api/lyrics?artist=' + encodeURIComponent(cleanArtist)
        + '&song=' + encodeURIComponent(cleanSong));
      if (gData.lyrics) {
        showLyricsText(gData.title || song, gData.artist || artist, gData.lyrics);
      } else {
        showLyricsNotFound(artist, song);
      }
    } catch(e) {
      showLyricsNotFound(artist, song);
    }
  }
}

function showLyricsText(song, artist, lyrics) {
  const body = document.getElementById('lyrics-body');
  body.innerHTML = '<div style="margin-bottom:16px;">'
    + '<p style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:2px;">' + escHtml(song) + '</p>'
    + '<p style="font-size:13px;color:var(--accent);margin-bottom:8px;">' + escHtml(artist) + '</p>'
    + '<button onclick="showTrackPicker(currentRecord.basic_information)" style="font-size:11px;color:var(--subtext);background:none;border:none;cursor:pointer;padding:0;">Back to tracks</button>'
    + '</div>'
    + '<div style="font-size:15px;color:var(--text);line-height:1.9;white-space:pre-wrap;font-family:var(--title-font);">'
    + escHtml(lyrics)
    + '</div>'
    + '<div style="height:40px;"></div>';
}

function showLyricsNotFound(artist, song) {
  const geniusUrl = 'https://genius.com/search?q=' + encodeURIComponent(artist + ' ' + song);
  document.getElementById('lyrics-body').innerHTML = '<div style="text-align:center;padding:60px 20px;">'
    + '<p style="font-size:32px;margin-bottom:16px;">🎵</p>'
    + '<p style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px;">Lyrics not found</p>'
    + '<p style="font-size:13px;color:var(--subtext);margin-bottom:24px;line-height:1.6;">Lyrics not available for "' + escHtml(song) + '". Try searching Genius:</p>'
    + '<a href="' + geniusUrl + '" target="_blank" style="background:var(--accent);color:var(--accent-text);text-decoration:none;padding:12px 24px;border-radius:var(--btn-shape);font-size:14px;font-weight:600;display:inline-block;">Search on Genius ↗</a>'
    + '<div style="margin-top:20px;"><button onclick="showTrackPicker(currentRecord.basic_information)" style="font-size:11px;color:var(--subtext);background:none;border:none;cursor:pointer;">Back to tracks</button></div>'

let chatHistory = [];
let chatRecord = null;
let chatThinking = false;

function startAiChat() {

function openChat() {
  if (!chatRecord) return;
  const bi = chatRecord.basic_information;
  const art = bi.cover_image || bi.thumb || '';

  // Set header
  document.getElementById('chat-rec-title').textContent = bi.title;
  document.getElementById('chat-rec-sub').textContent = (bi.artists?.[0]?.name || '') + (bi.year ? ' · ' + bi.year : '');

  // Set art
  const artWrap = document.getElementById('chat-art-wrap');
  if (art && art !== 'https://st.discogs.com/') {
    artWrap.innerHTML = '<img class="chat-record-art" src="' + art + '" alt="">';
  } else {
    artWrap.innerHTML = '<div class="chat-record-art-placeholder"><div style="width:20px;height:20px;border-radius:50%;background:var(--disc);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;"><div style="width:4px;height:4px;border-radius:50%;background:var(--artbg);"></div></div></div>';
  }

  // Reset chat if new record
  if (chatHistory.length === 0 || chatHistory[0]?.record !== bi.title) {
    chatHistory = [];
    document.getElementById('chat-messages').innerHTML = '';
    // Send opening context message
    setTimeout(() => sendContextualOpener(bi), 300);
  }

  // Show suggestions
  renderSuggestions(bi);

  document.getElementById('chat-panel').classList.add('open');
  setTimeout(() => document.getElementById('chat-input').focus(), 400);

function closeChat() {
  document.getElementById('chat-panel').classList.remove('open');
}

function renderSuggestions(bi) {
  const suggestions = [
    'Tell me about the recording of this album',
    'What should I listen for?',
    'Band or artist history',
    'Similar artists I might like',
    'What makes this album special?',
    'Tell me about the lyrics',
    'Recommend a similar album',
  ];
  const el = document.getElementById('chat-suggestions');
  el.innerHTML = suggestions.map(s =>
    '<button class="chat-suggestion" onclick="useSuggestion(this.textContent)">' + escHtml(s) + '</button>'
  ).join('');
}

function useSuggestion(text) {
  document.getElementById('chat-input').value = text;
  sendChatMessage();
}

function buildSystemPrompt(bi) {
  return 'You are a knowledgeable vinyl record companion. The user is currently listening to "'
    + bi.title + '" by ' + (bi.artists?.map(a => a.name).join(', ') || 'Unknown') + '.'
    + (bi.year ? ' Released in ' + bi.year + '.' : '')
    + (bi.genres?.length ? ' Genre: ' + bi.genres.join(', ') + '.' : '')
    + (bi.styles?.length ? ' Style: ' + bi.styles.join(', ') + '.' : '')
    + (bi.labels?.[0]?.name ? ' Label: ' + bi.labels[0].name + '.' : '')
    + ' Provide engaging, conversational responses about the music, band history, recording stories, '
    + 'what to listen for, lyrical themes, and related recommendations. Keep responses concise but rich — '
    + 'the user is listening to a record right now so make it feel like a conversation with a music expert friend. '
    + 'Use markdown sparingly. No bullet point lists unless specifically asked.';
}

async function sendContextualOpener(bi) {
    const opener = ["Now listening to ", bi.title, " by ", (bi.artists?.[0]?.name || "this artist"),
    ". Give me a one-paragraph intro to this album. Set the scene and get me excited for what I am about to hear. Under 80 words."].join("");
  await sendMessage(opener, true); // true = hide the user message
}

function addMessage(role, text) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  const now = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  div.innerHTML = '<div class="chat-bubble-msg">' + escHtml(text) + '</div>'
    + '<div class="chat-msg-time">' + now + '</div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function showTyping() {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg assistant';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendChatMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || chatThinking) return;
  input.value = '';
  input.style.height = 'auto';
  await sendMessage(text, false);
}

async function sendMessage(text, hidden) {
  if (chatThinking) return;
  chatThinking = true;
  const sendBtn = document.getElementById('chat-send-btn');
  if (sendBtn) sendBtn.disabled = true;

  if (!hidden) addMessage('user', text);

  chatHistory.push({ role: 'user', content: text });

  showTyping();

  try {
    const bi = chatRecord.basic_information;
    const data = await apiPost('/api/chat', {
      model: 'claude-sonnet-4-6',
      max_tokens: 400,
      system: buildSystemPrompt(bi),
      messages: chatHistory,
    });

    hideTyping();

    if (data.content?.[0]?.text) {
      const reply = data.content[0].text;
      chatHistory.push({ role: 'assistant', content: reply });
      addMessage('assistant', reply);
    } else if (data.error) {
      addMessage('assistant', 'Sorry, I had trouble connecting. Try again in a moment.');
      console.error('Claude API error:', data.error);
    }
  } catch(e) {
    hideTyping();
    addMessage('assistant', 'Connection issue — try again in a moment.');
    console.error('Chat error:', e);
  }

  chatThinking = false;
  if (sendBtn) sendBtn.disabled = false;
}

async function handleAvatarUpload(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    alert('Please choose an image under 2MB.');
    return;
  }
  const reader = new FileReader();
  reader.onload = async function(e) {
    const dataUrl = e.target.result;
    try {
      await apiPost('/api/auth/avatar', { avatarUrl: dataUrl });
      CURRENT_USER.avatarUrl = dataUrl;
      renderAccountSection();
    } catch(err) {
      alert('Could not save profile picture. Please try again.');
    }
  };
  reader.readAsDataURL(file);
}

let _searchDebounceTimer = null;
function handleSearchTypeahead(val) {
  clearTimeout(_searchDebounceTimer);
  const trimmed = val.trim();
  if (trimmed.length < 3) {
    document.getElementById('search-results').innerHTML = '';
    return;
  }
  document.getElementById('search-results').innerHTML =
    '<div style="display:flex;align-items:center;gap:10px;padding:20px 0 10px;color:var(--subtext);font-size:13px;">'
    + '<div style="width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0;"></div>'
    + 'Searching...</div>';
  _searchDebounceTimer = setTimeout(async function() {
    try {
      const data = await apiGet('/api/search-release?q=' + encodeURIComponent(trimmed));
      renderSearchResults(data.results || []);
    } catch(e) {
      document.getElementById('search-results').innerHTML =
        '<p style="text-align:center;color:var(--subtext);font-size:13px;padding:20px 0;">Search failed. Try again.</p>';
    }
  }, 450);
}

async function runRecordSearch() {
  const val = (document.getElementById('search-record-input') || {}).value || '';
  handleSearchTypeahead(val);
}

function renderSearchResults(items) {
  const results = document.getElementById('search-results');
  if (!results) return;
  if (items.length === 0) {
    results.innerHTML = '<p style="text-align:center;color:var(--subtext);font-size:13px;padding:40px 0;">No results found. Try a different search.</p>';
    return;
  }
  // Build a set of owned release IDs and normalised titles so we can badge results
  // that are already in the collection — useful when browsing an artist's catalogue.
  const ownedIds = new Set(releases.map(function(r) { return String(r.id); }));
  const ownedTitles = new Set(releases.map(function(r) {
    const bi = r.basic_information;
    const artist = (bi.artists[0]?.name || '').replace(/\s*\(\d+\)$/, '').toLowerCase().trim();
    return artist + '|' + bi.title.toLowerCase().trim();
  }));

  window._searchResultsCache = items;
  results.innerHTML = items.map(function(item, i) {
    const img = item.coverImage || item.thumb || '';
    // Check by release ID first, then by normalised "artist|title" string
    const dashSplit = item.title.split(' - ');
    const searchArtist = (dashSplit.length >= 2 ? dashSplit[0] : '').toLowerCase().trim();
    const searchTitle  = (dashSplit.length >= 2 ? dashSplit.slice(1).join(' - ') : item.title).toLowerCase().trim();
    const owned = ownedIds.has(String(item.discogsId)) || ownedTitles.has(searchArtist + '|' + searchTitle);
    const imgEl = img
      ? '<img src="' + img + '" style="width:48px;height:48px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--artbg);">'
      : '<div style="width:48px;height:48px;border-radius:6px;background:var(--artbg);flex-shrink:0;"></div>';
    const badge = owned
      ? '<span style="font-size:10px;font-weight:700;color:var(--accent);border:1px solid var(--accent);border-radius:4px;padding:2px 5px;white-space:nowrap;">OWNED</span>'
      : '<span style="font-size:20px;color:var(--accent);">+</span>';
    return '<div id="search-row-' + i + '" onclick="' + (owned ? '' : 'confirmAddRecord(' + i + ')') + '" '
      + 'style="display:flex;gap:12px;align-items:center;padding:10px 0;border-bottom:var(--border-w) solid var(--border);cursor:' + (owned ? 'default' : 'pointer') + ';opacity:' + (owned ? '0.6' : '1') + ';">'
      + imgEl
      + '<div style="flex:1;min-width:0;">'
      +   '<div style="font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escHtml(item.title) + '</div>'
      +   '<div style="font-size:12px;color:var(--subtext);">' + escHtml([item.year, item.format].filter(Boolean).join(' · ')) + '</div>'
      + '</div>'
      + badge
      + '</div>';
  }).join('');
}

async function confirmAddRecord(idx) {
  const item = (window._searchResultsCache || [])[idx];
  if (!item) return;
  // Parse "Artist - Title" format that Discogs search typically returns
  let artist = '', title = item.title;
  const dashSplit = item.title.split(' - ');
  if (dashSplit.length >= 2) {
    artist = dashSplit[0].trim();
    title = dashSplit.slice(1).join(' - ').trim();
  }
  // Optimistically mark the row as added so the user gets instant feedback
  // and can keep browsing without waiting for the network round-trip.
  const row = document.getElementById('search-row-' + idx);
  if (row) {
    row.style.opacity = '0.5';
    row.style.pointerEvents = 'none';
    const badge = row.querySelector('span:last-child');
    if (badge) { badge.textContent = '✓'; badge.style.fontSize = '18px'; }
  }
  try {
    await apiPost('/api/records', {
      discogsId: item.discogsId,
      title: title,
      artist: artist || 'Unknown Artist',
      year: item.year,
      genre: item.genre,
      style: item.style,
      format: item.format,
      label: item.label,
      coverImage: item.coverImage,
      thumb: item.thumb,
    });
    // Mark as owned in the cached results and update the badge to OWNED
    if (row) {
      const badge = row.querySelector('span:last-child');
      if (badge) {
        badge.textContent = 'OWNED';
        badge.style.fontSize = '10px';
        badge.style.fontWeight = '700';
        badge.style.border = '1px solid var(--accent)';
        badge.style.borderRadius = '4px';
        badge.style.padding = '2px 5px';
      }
      row.style.cursor = 'default';
      row.onclick = null;
    }
    // Refresh collection count in the background without closing the panel
    fetchCollection().then(function(data) {
      releases = data.releases || [];
      filtered = [...releases];
      // Update all nav/stat counters without closing the panel or re-rendering the whole app
      const countEls = document.querySelectorAll('.nav-sub');
      countEls.forEach(function(el) { el.textContent = releases.length + ' records'; });
      const statNums = document.querySelectorAll('.stat-num');
      if (statNums[0]) statNums[0].textContent = releases.length;
      if (statNums[1]) statNums[1].textContent = new Set(releases.map(function(r) { return r.basic_information.artists[0]?.name; })).size;
      if (statNums[2]) statNums[2].textContent = new Set(releases.map(function(r) { return r.basic_information.genres?.[0]; }).filter(Boolean)).size;
    });
  } catch(e) {
    // Restore the row on failure
    if (row) { row.style.opacity = '1'; row.style.pointerEvents = ''; }
    if (e.message && e.message.includes('Already')) {
      alert('That record is already in your collection.');
    } else {
      alert('Could not add that record. Please try again.');
    }
  }
}

async function startDiscogsLink() {
  try {
    const data = await apiGet('/auth/login');
    if (data.redirectUrl) {
      window.location.href = data.redirectUrl;
    }
  } catch(e) {
    alert('Could not start Discogs connection. Please try again.');
  }
}

async function syncDiscogs() {
  const btn = document.getElementById('sync-now-btn');
  if (btn) { btn.textContent = '⟳ Syncing...'; btn.disabled = true; }
  try {
    const data = await apiPost('/api/sync-discogs', {});
    // Reload the collection from the freshly-synced DB
    const colData = await fetchCollection();
    releases = colData.releases || [];
    filtered = [...releases];
    renderApp();
    if (btn) { btn.textContent = '✓ Synced ' + (data.synced || '') + ' records'; btn.disabled = false; }
  } catch(e) {
    if (btn) { btn.textContent = '⟳ Sync Now'; btn.disabled = false; }
    alert('Sync failed. Please try again.');
  }
}

async function unlinkDiscogs() {
  if (!confirm('Unlink your Discogs account? Records synced from Discogs will no longer appear, but anything you added manually in Wax will stay.')) return;
  try {
    await apiPost('/api/auth/discogs/unlink');
    window.location.reload();
  } catch(e) {
    alert('Could not unlink Discogs. Please try again.');
  }
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function submitPasswordReset() {
  const email = document.getElementById('reset-email').value.trim();
  const newPassword = document.getElementById('reset-password').value;
  if (!email || !newPassword) {
    const el = document.getElementById('reset-error');
    el.textContent = 'Please fill in both fields.';
    el.style.display = 'block';
    return;
  }
  const btn = document.getElementById('reset-submit-btn');
  btn.disabled = true;
  btn.textContent = 'Resetting...';
  try {
    const data = await apiPost('/api/auth/reset-password', { email, newPassword });
    setToken(data.token);
    init();
  } catch(e) {
    const el = document.getElementById('reset-error');
    el.textContent = e.message || 'Could not reset password.';
    el.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Reset Password';
  }
}

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'signup' : 'login';
  showLogin();
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

async function submitAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const nameInput = document.getElementById('auth-name');
  const displayName = nameInput ? nameInput.value.trim() : '';

  if (!email || !password) {
    showAuthError('Please fill in all fields.');
    return;
  }

  const btn = document.getElementById('auth-submit-btn');
  btn.disabled = true;
  btn.textContent = authMode === 'login' ? 'Logging in...' : 'Creating account...';

  try {
    const endpoint = authMode === 'login' ? '/api/auth/login' : '/api/auth/signup';
    const body = authMode === 'login' ? { email, password } : { email, password, displayName };
    const data = await apiPost(endpoint, body);
    setToken(data.token);
    init();
  } catch(e) {
    showAuthError(e.message || 'Something went wrong. Please try again.');
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'Log In' : 'Create Account';
  }
}

function showLoading(msg) {
  document.getElementById('app-content').innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-text" style="text-align:center;line-height:1.8;">${msg}</div>
    </div>
  `;
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const discogsLinked = params.get('discogs_linked');
  const authError = params.get('error');
  const user = params.get('user');

  // Clean URL after Discogs link redirect
  if (discogsLinked || authError) {
    window.history.replaceState({}, '', '/');
  }

  const token = getToken();
  if (!token) {
    showLogin(authError ? 'Connection failed. Please try again.' : null);
    return;
  }

  showLoading('Loading Wax…');
  try {
    const me = await apiGet('/api/auth/me');
    CURRENT_USER = me;
    USERNAME = me.discogsUsername || me.displayName || me.email;

    showLoading(`Loading your collection…<br><span style="font-size:11px;opacity:0.6;">${me.discogsLinked ? 'Syncing from Discogs and your library' : 'Loading your library'}</span>`);
    let data;
    try {
      data = await fetchCollection();
    } catch(e) {
      if (e.message === '403') {
        showPrivateCollectionMessage(e.data && e.data.username || USERNAME);
        return;
      }
      throw e;
    }
    releases = data.releases || [];
    filtered = [...releases];
    applyTheme(currentTheme);
    // Show tab bar now that user is logged in
    const tb = document.getElementById('tab-bar');
    if (tb) tb.style.display = 'grid';
    checkPendingBadge();
    renderApp();
  } catch(e) {
    if (e.message === 'not_authenticated') {
      clearToken();
      showLogin();
    } else {
      showLogin('Something went wrong. Please try again.');
      console.error(e);
    }
  }
}


// ── SOUND ENGINE ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playTone(freq, dur, type='sine', vol=0.3, delay=0) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    gain.gain.setValueAtTime(0, ctx.currentTime + delay);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + dur + 0.05);
  } catch(e) {}
}

function playNoise(dur, vol=0.15, delay=0) {
  try {
    const ctx = getAudioCtx();
    const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1);
    const src = ctx.createBufferSource();
    const filter = ctx.createBiquadFilter();
    const gain = ctx.createGain();
    src.buffer = buf;
    filter.type = 'bandpass';
    filter.frequency.value = 800;
    src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    gain.gain.setValueAtTime(vol, ctx.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
    src.start(ctx.currentTime + delay);
  } catch(e) {}
}

// ── ORACLE SOUNDS ──
function soundOracle() {
  // Deep resonant bell tones - like a monastery bell
  [[130, 4.0, 0.18], [196, 3.0, 0.12], [261, 2.0, 0.08], [98, 3.5, 0.06]].forEach(([f, d, v], i) => {
    playTone(f, d, 'sine', v, i * 0.5);
  });
}
function soundOracleReveal() {

// ── WHEEL TICK ──
function soundWheelTick() {
  try {
    const ctx = getAudioCtx();
    // Sharp mechanical click - like a real prize wheel peg
    const dur = 0.05;
    const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * dur), ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const t = i / ctx.sampleRate;
      // Short sharp transient with quick decay
      data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 120);
    }
    const src = ctx.createBufferSource();
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 1200;
    filter.Q.value = 0.8;
    const gain = ctx.createGain();
    gain.gain.value = 0.5;
    src.buffer = buf;
    src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    src.start();
  } catch(e) {}
}

// ── SLOT MACHINE SOUNDS ──
function soundLeverPull() {

    const ctx = getAudioCtx();

    playNoise(0.06, 0.3, 0);
    playTone(220, 0.08, 'square', 0.15, 0.02);

}

let slotTickInterval = null;
function startSlotTick() {
  stopSlotTick();
  let delay = 30; // ms - starts fast
  let count = 0;
  function tick() {
    // Mechanical reel tick - like a real slot machine
    try {
      const ctx = getAudioCtx();
      const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.03), ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) {
        d[i] = (Math.random()*2-1) * Math.exp(-i/(ctx.sampleRate*0.004));
      }
      const src = ctx.createBufferSource();
      const g = ctx.createGain(); g.gain.value = 0.25;
      src.buffer = buf; src.connect(g); g.connect(ctx.destination); src.start();
    } catch(e) {}
    count++;
    // Gradually slow down
    delay = Math.min(180, delay + count * 0.8);
    if (count < 60) slotTickInterval = setTimeout(tick, delay);
  }
  tick();
}
function stopSlotTick() {
  if (slotTickInterval) { clearTimeout(slotTickInterval); slotTickInterval = null; }
}
function soundSlotWin() {
  stopSlotTick();
  // Classic slot win - ascending coins jingle
  const notes = [523, 659, 523, 659, 784, 1046];
  notes.forEach((f, i) => {
    playTone(f, 0.25, 'sine', 0.22, i * 0.1);
  });
  // Coin rattle noise burst
  [0.05, 0.12, 0.19, 0.26, 0.33].forEach(d => playNoise(0.04, 0.12, d));
  // Bass note
  playTone(261, 0.6, 'sine', 0.12, 0);
}

// ── CRATE DIG SOUNDS ──
function soundCrateThud() {
  try {
    const ctx = getAudioCtx();
    // Record sleeve landing on a stack - low thud + paper rustle
    playTone(65, 0.12, 'sine', 0.6, 0);
    playTone(48, 0.18, 'sine', 0.4, 0.02);
    playNoise(0.08, 0.15, 0); // paper rustle
  } catch(e) {}
}

function soundCrateFlip() {
  // Record sleeve whoosh - like flicking through a crate
  try {
    const ctx = getAudioCtx();
    const dur = 0.18;
    const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * dur), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const t = i / ctx.sampleRate;
      // Sharp attack, quick decay - paper flick sound
      const env = Math.sin(Math.PI * t / dur) * Math.exp(-t * 12);
      d[i] = (Math.random() * 2 - 1) * env;
    }
    const src = ctx.createBufferSource();
    // Two filters: highpass for papery brightness + lowpass to remove harshness
    const hp = ctx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 400;
    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 4000;
    const gain = ctx.createGain();
    gain.gain.value = 0.55; // noticeably louder
    src.buffer = buf;
    src.connect(hp); hp.connect(lp); lp.connect(gain); gain.connect(ctx.destination);
    src.start();
  } catch(e) {}
}

// Oracle voice
async function speakOracle(text) {
  try {
    const token = getToken();
    if (!token) return;
    const res = await fetch('/api/speak', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ text }),
    });
    if (!res.ok) {
      console.warn('ElevenLabs TTS failed:', res.status);
      return;
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.volume = 0.9;
    audio.play();
    audio.onended = () => URL.revokeObjectURL(url);
  } catch(e) {
    console.warn('Oracle voice error:', e.message);
  }
}

let currentTab = 'collection';

// Always-available home navigation — tapping Wax logo or using back from any sub-view
function goHome() {
  currentTab = 'collection';
  document.querySelectorAll('.tab-item').forEach(function(el) { el.classList.remove('active'); });
  renderApp();
}

// ── Tab switching ────────────────────────────────────────────
function switchTab(tab) {
  // Tapping Friends when already in Friends goes back home
  if (tab === 'friends' && currentTab === 'friends') {
    goHome();
    return;
  }
  currentTab = tab;
  document.querySelectorAll('.tab-item').forEach(function(el) { el.classList.remove('active'); });
  const tabEl = document.getElementById('tab-' + tab);
  if (tabEl) tabEl.classList.add('active');
  if (tab === 'collection') {
    renderApp();
  } else if (tab === 'friends') {
    if (!CURRENT_USER || !CURRENT_USER.username) {
      showUsernameGate(function() { switchTab('friends'); });
    } else {
      renderFriendsApp();
    }
  }
}

// ── Username gate ────────────────────────────────────────────
function showUsernameGate(onSuccess) {
  const existing = document.getElementById('username-gate');
  if (existing) existing.remove();
  const gate = document.createElement('div');
  gate.className = 'gate-overlay';
  gate.id = 'username-gate';
  gate.innerHTML = '<div class="gate-sheet">'
    + '<div style="font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px;">Choose a username</div>'
    + '<div style="font-size:13px;color:var(--subtext);margin-bottom:20px;line-height:1.6;">Pick a handle so friends can find you on Wax. Letters, numbers, dots, hyphens, underscores — no spaces.</div>'
    + '<input id="gate-username-input" type="text" placeholder="e.g. david.slack" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" maxlength="30" '
    + 'style="width:100%;background:var(--card);border:var(--border-w) solid var(--border);border-radius:var(--radius);padding:13px 14px;font-size:15px;color:var(--text);font-family:inherit;margin-bottom:6px;" '
    + 'oninput="this.value=this.value.toLowerCase();" onkeydown="if(event.key===\'Enter\')submitUsernameGate();">'
    + '<div id="gate-error" style="font-size:12px;color:#e05050;min-height:18px;margin-bottom:10px;"></div>'
    + '<button id="gate-submit-btn" onclick="submitUsernameGate()" style="width:100%;background:var(--accent);border:none;border-radius:var(--btn-shape);padding:14px;font-size:14px;font-weight:600;color:var(--accent-text);cursor:pointer;font-family:inherit;margin-bottom:10px;">Set username</button>'
    + '<button onclick="document.getElementById(\'username-gate\').remove();" style="width:100%;background:none;border:none;color:var(--subtext);font-size:13px;cursor:pointer;font-family:inherit;">Maybe later</button>'
    + '</div>';
  document.body.appendChild(gate);
  window._gateOnSuccess = onSuccess;
  setTimeout(function() { const inp = document.getElementById('gate-username-input'); if (inp) inp.focus(); }, 100);
}

async function submitUsernameGate() {
  const input = document.getElementById('gate-username-input');
  const errEl = document.getElementById('gate-error');
  const btn = document.getElementById('gate-submit-btn');
  const username = (input ? input.value : '').trim().toLowerCase();
  if (!/^[a-z0-9._-]{2,30}$/.test(username)) {
    if (errEl) errEl.textContent = 'Must be 2–30 chars: letters, numbers, dots, hyphens, underscores.';
    return;
  }
  if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }
  try {
    await apiPost('/api/auth/username', { username });
    CURRENT_USER.username = username;
    const gate = document.getElementById('username-gate');
    if (gate) gate.remove();
    if (window._gateOnSuccess) window._gateOnSuccess();
  } catch(e) {
    if (errEl) errEl.textContent = e.message || 'Could not save username. Try another.';
    if (btn) { btn.disabled = false; btn.textContent = 'Set username'; }
  }
}

function renderFriendsView(pending, following, followers) {
  const body = document.getElementById('friends-view-body');
  if (!body) return;
  let html = '';
  if (pending.length > 0) {
    html += '<div class="section-hdr">Follow requests (' + pending.length + ')</div>';
    pending.forEach(function(u) {
      html += '<div class="user-row" style="cursor:default;">' + userAvatarHtml(u, 44)
        + '<div class="user-info"><div class="user-handle">@' + escHtml(u.username || '') + '</div>'
        + '<div class="user-sub">' + escHtml(u.display_name || '') + '</div></div>'
        + '<div class="req-actions">'
        + '<button class="req-accept" onclick="acceptRequest(' + u.id + ')">Accept</button>'
        + '<button class="req-decline" onclick="declineRequest(' + u.id + ')">✕</button>'
        + '</div></div>';
    });
  }
  html += '<div class="section-hdr">Following (' + following.length + ')</div>';
  if (following.length === 0) {
    html += '<div style="padding:24px 16px;color:var(--subtext);font-size:13px;text-align:center;">Not following anyone yet.<br><br>'
      + '<button onclick="openFriendsSearch()" style="background:var(--accent);border:none;color:var(--accent-text);border-radius:var(--radius);padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Find people to follow</button></div>';
  } else {
    following.forEach(function(u) {
      html += '<div class="user-row" onclick="openUserProfile(\'' + escHtml(u.username || '') + '\')">' + userAvatarHtml(u, 44)
        + '<div class="user-info"><div class="user-handle">@' + escHtml(u.username || '') + '</div>'
        + '<div class="user-sub">' + (u.record_count || 0) + ' records · ' + (u.is_public ? 'Public' : 'Private') + '</div></div>'
        + '<span style="font-size:12px;color:var(--subtext);">' + (u.status === 'pending' ? 'Requested' : 'Following') + '</span></div>';
    });
  }
  html += '<div class="section-hdr">Followers (' + followers.length + ')</div>';
  if (followers.length === 0) {
    html += '<div style="padding:20px 16px;color:var(--subtext);font-size:13px;text-align:center;">No followers yet.</div>';
  } else {
    followers.forEach(function(u) {
      html += '<div class="user-row" onclick="openUserProfile(\'' + escHtml(u.username || '') + '\')">' + userAvatarHtml(u, 44)
        + '<div class="user-info"><div class="user-handle">@' + escHtml(u.username || '') + '</div>'
        + '<div class="user-sub">' + (u.record_count || 0) + ' records</div></div></div>';
    });
  }
  body.innerHTML = html;
}

let _friendsSearchTimer = null;
function handleFriendsSearch(val) {
  clearTimeout(_friendsSearchTimer);
  const q = val.trim();
  const el = document.getElementById('friends-search-results');
  if (!el) return;
  if (q.length < 2) { el.innerHTML = ''; return; }
  el.innerHTML = '<div style="color:var(--subtext);font-size:13px;padding:10px 0;">Searching...</div>';
  _friendsSearchTimer = setTimeout(async function() {
    try {
      const data = await apiGet('/api/users/search?q=' + encodeURIComponent(q));
      const users = data.users || [];
      if (!users.length) { el.innerHTML = '<div style="color:var(--subtext);font-size:13px;padding:20px 0;text-align:center;">No users found.</div>'; return; }
      el.innerHTML = users.map(function(u) {
        const st = u.follow_status || 'none';
        const lbl = st === 'accepted' ? 'Following' : st === 'pending' ? 'Requested' : 'Follow';
        return '<div class="user-row" onclick="openUserProfile(\'' + escHtml(u.username || '') + '\')">'
          + userAvatarHtml(u, 44)
          + '<div class="user-info"><div class="user-handle">@' + escHtml(u.username || '') + '</div>'
          + '<div class="user-sub">' + (u.record_count || 0) + ' records · ' + (u.is_public ? 'Public' : 'Private') + '</div></div>'
          + '<button class="follow-btn ' + st + '" onclick="event.stopPropagation();toggleFollow(' + u.id + ',\'' + st + '\',this);">' + lbl + '</button></div>';
      }).join('');
    } catch(e) { el.innerHTML = '<div style="color:var(--subtext);font-size:13px;padding:10px 0;">Search failed.</div>'; }
  }, 400);
}

// ── Follow actions ───────────────────────────────────────────
async function toggleFollow(userId, currentStatus, btn) {
  if (btn) btn.disabled = true;
  try {
    if (currentStatus === 'none') {
      const data = await apiPost('/api/follow/' + userId, {});
      const ns = data.status;
      if (btn) { btn.className = 'follow-btn ' + ns; btn.textContent = ns === 'accepted' ? 'Following' : 'Requested'; }
    } else {
      await apiDelete('/api/follow/' + userId);
      if (btn) { btn.className = 'follow-btn none'; btn.textContent = 'Follow'; }
    }
  } catch(e) { alert('Could not update follow status.'); }
  if (btn) btn.disabled = false;
}

async function acceptRequest(userId) {
  try { await apiPost('/api/follow/' + userId + '/accept', {}); renderFriendsApp(); checkPendingBadge(); }
  catch(e) { alert('Could not accept request.'); }
}

async function declineRequest(userId) {
  try { await apiPost('/api/follow/' + userId + '/decline', {}); renderFriendsApp(); checkPendingBadge(); }
  catch(e) { alert('Could not decline request.'); }
}

async function checkPendingBadge() {
  if (!CURRENT_USER || !CURRENT_USER.username) return;
  try {

    const count = (data.requests || []).length;
    const badge = document.getElementById('friends-badge');

    ? '<img src="' + escHtml(profile.avatarUrl) + '" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--border);">'
    : '<div class="profile-avatar">' + escHtml(((profile.username || '?').charAt(0)).toUpperCase()) + '</div>';
